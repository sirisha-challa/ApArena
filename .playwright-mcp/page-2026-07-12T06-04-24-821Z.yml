                - heading "What is an Analogy?" [level=3] [ref=e644]
                - generic [ref=e645]: ▼
              - generic:
                - paragraph [ref=e647]: An analogy is a comparison between two things that shows how they are similar. Companies use analogy questions to test your reasoning, vocabulary, and pattern recognition skills. These appear in TCS, Infosys, Wipro, Accenture and almost all campus placement exams.
                - list [ref=e648]:
                  - listitem [ref=e649]:
                    - strong [ref=e650]: Why Companies Ask Analogy Questions
                    - paragraph [ref=e652]: "Companies want people who think logically and spot patterns quickly. Solving analogies proves you can: (1) Understand relationships between concepts, (2) Think abstractly, (3) Make quick decisions under pressure. These are essential IT job skills."
                  - listitem [ref=e653]:
                    - strong [ref=e654]: Basic Structure
                    - paragraph [ref=e656]: "An analogy looks like: A : B :: C : ? (read as A is to B as C is to what). Your job is to find the relationship between A and B, then apply it to C. Example: Doctor : Hospital :: Teacher : ? Answer: School (a doctor works in a hospital, a teacher works in a school)."
                  - listitem [ref=e657]:
                    - strong [ref=e658]: Real-Life Example
                    - paragraph [ref=e660]: If your friend says My phone is to me what wings are to a bird, you understand the phone is essential for communication just like wings are essential for flight. You are comparing two relationships that work the same way.
                  - listitem [ref=e661]:
                    - strong [ref=e662]: How to Approach
                    - generic [ref=e664]:
                      - generic [ref=e665]:
                        - generic [ref=e666]: Step 1
                        - generic [ref=e667]: Read the first pair carefully.
                      - generic [ref=e668]:
                        - generic [ref=e669]: Step 2
                        - generic [ref=e670]: Identify the exact relationship.
                      - generic [ref=e671]:
                        - generic [ref=e672]: Step 3
                        - generic [ref=e673]: Apply the same relationship to C.
                      - generic [ref=e674]:
                        - generic [ref=e675]: Step 4
                        - generic [ref=e676]: Find the matching answer.
                      - generic [ref=e677]:
                        - generic [ref=e678]: Step 5
                        - generic [ref=e679]: Double-check by reversing the logic.
                - button "Mark as Read" [ref=e680] [cursor=pointer]
            - generic [ref=e681]:
              - generic [ref=e682] [cursor=pointer]:
                - heading "Word Analogies (Most Common)" [level=3] [ref=e683]
                - generic [ref=e684]: ▼
              - generic:
                - paragraph [ref=e686]: Word analogies use regular English words. The relationship can be based on meaning, function, category, or association.
                - list [ref=e687]:
                  - listitem [ref=e688]:
                    - strong [ref=e689]: Synonym Analogies (Same Meaning)
                    - paragraph [ref=e691]: "The relationship is same meaning. Example: Happy : Joyful :: Sad : ? Answer: Unhappy. Common pairs: Big-Large, Small-Tiny, Fast-Quick, Brave-Courageous, Afraid-Scared."
                  - listitem [ref=e692]:
                    - strong [ref=e693]: Antonym Analogies (Opposite Meaning)
                    - paragraph [ref=e695]: "The relationship is opposite meaning. Example: Hot : Cold :: Light : ? Answer: Dark. Common pairs: Up-Down, Good-Bad, Happy-Sad, Rich-Poor, Strong-Weak."
                  - listitem [ref=e696]:
                    - strong [ref=e697]: Cause and Effect Analogies
                    - paragraph [ref=e699]: "One word causes the other. Example: Rain : Flood :: Virus : ? Answer: Disease. Ask yourself: Does A cause B?"
                  - listitem [ref=e700]:
                    - strong [ref=e701]: Function/Use Analogies
                    - paragraph [ref=e703]: "Shows what something is used for. Example: Pen : Write :: Knife : ? Answer: Cut. Pattern: A is used to B."
                  - listitem [ref=e704]:
                    - strong [ref=e705]: Part to Whole Analogies
                    - paragraph [ref=e707]: "First word is part of the second. Example: Finger : Hand :: Toe : ? Answer: Foot. More: Page : Book, Wheel : Car, Leaf : Tree."
                  - listitem [ref=e708]:
                    - strong [ref=e709]: Profession and Tool
                    - paragraph [ref=e711]: "Shows what tool a professional uses. Example: Doctor : Stethoscope :: Carpenter : ? Answer: Hammer. Common: Teacher-Chalk, Chef-Knife, Painter-Brush."
                  - listitem [ref=e712]:
                    - strong [ref=e713]: Animal and Young Ones
                    - paragraph [ref=e715]: "Shows parent and baby relationship. Example: Cat : Kitten :: Dog : ? Answer: Puppy. Memorize: Cow-Calf, Lion-Cub, Sheep-Lamb, Horse-Foal."
                  - listitem [ref=e716]:
                    - strong [ref=e717]: Animal and Home/Dwelling
                    - paragraph [ref=e719]: "Shows where an animal lives. Example: Dog : Kennel :: Bird : ? Answer: Nest. Learn: Lion-Den, Rabbit-Burrow, Bee-Hive, Horse-Stable."
                  - listitem [ref=e720]:
                    - strong [ref=e721]: Country and Capital
                    - paragraph [ref=e723]: "Shows capital cities. Example: India : Delhi :: USA : ? Answer: Washington DC. Must-know: India-Delhi, UK-London, France-Paris, Japan-Tokyo."
                  - listitem [ref=e724]:
                    - strong [ref=e725]: Person and Achievement
                    - paragraph [ref=e727]: "Shows who created something. Example: Shakespeare : Hamlet :: Einstein : ? Answer: Theory of Relativity. Common: Newton-Gravity, Edison-Light Bulb."
                - button "Mark as Read" [ref=e728] [cursor=pointer]
            - generic [ref=e729]:
              - generic [ref=e730] [cursor=pointer]:
                - heading "Letter and Number Analogies" [level=3] [ref=e731]
                - generic [ref=e732]: ▼
              - generic:
                - paragraph [ref=e734]: Letter analogies use alphabet patterns and number analogies use mathematical relationships.
                - list [ref=e735]:
                  - listitem [ref=e736]:
                    - strong [ref=e737]: Position-Based Letter Analogies
                    - paragraph [ref=e739]: "Uses A=1, B=2, C=3...Z=26. Example: A : D :: B : ? Answer: E (A+3=D, B+3=E). Common: +1, +2, +3 shifts, reverse positions, mirror positions."
                  - listitem [ref=e740]:
                    - strong [ref=e741]: Skip Pattern Analogies
                    - paragraph [ref=e743]: "Letters skip a fixed number. Example: A : C :: E : ? Answer: G (skip 1 letter)."
                  - listitem [ref=e744]:
                    - strong [ref=e745]: Mirror/Reverse Analogies
                    - paragraph [ref=e747]: "A <-> Z, B <-> Y, C <-> X. Example: ABC : ZYX :: DEF : ? Answer: WVU."
                  - listitem [ref=e748]:
                    - strong [ref=e749]: Addition/Subtraction Number Patterns
                    - paragraph [ref=e751]: "Simple arithmetic. Example: 5 : 8 :: 10 : ? Answer: 13 (add 3)."
                  - listitem [ref=e752]:
                    - strong [ref=e753]: Multiplication and Square Patterns
                    - paragraph [ref=e755]: "Example: 4 : 12 :: 6 : ? Answer: 18 (multiply by 3). Or 3 : 9 :: 5 : ? Answer: 25 (square)."
                  - listitem [ref=e756]:
                    - strong [ref=e757]: Digit-Based Patterns
                    - paragraph [ref=e759]: "Manipulates digits. Example: 12 : 3 :: 45 : ? Answer: 9 (1+2=3, 4+5=9). Or reverse digits."
                - button "Mark as Read" [ref=e760] [cursor=pointer]
            - generic [ref=e761]:
              - generic [ref=e762] [cursor=pointer]:
                - heading "Pattern Recognition - Find Relationships Fast" [level=3] [ref=e763]
                - generic [ref=e764]: ▼
              - generic [ref=e765]:
                - paragraph [ref=e767]: The key to solving analogies quickly is recognizing the relationship type within 10-15 seconds.
                - list [ref=e768]:
                  - listitem [ref=e769]:
                    - strong [ref=e770]: The 5-Second Classification Test
                    - paragraph [ref=e772]: "Ask in order: (1) Are they synonyms? (2) Are they opposites? (3) Does one cause the other? (4) Is one part of the other? (5) Is there a functional relationship? Practice until automatic."
                  - listitem [ref=e773]:
                    - strong [ref=e774]: Keyword Triggers
                    - paragraph [ref=e776]: Similar meanings -> Synonym. Opposite meanings -> Antonym. Action words -> Function. Place names -> Location. Person names -> Achievement. Numbers -> Mathematical. Animals -> Young One or Home.
                  - listitem [ref=e777]:
                    - strong [ref=e778]: Sentence Frame Technique
                    - paragraph [ref=e780]: "Force into a sentence: A is a type of B, A uses B, A lives in B, A causes B, A is opposite of B. The frame that fits tells you the relationship."
                  - listitem [ref=e781]:
                    - strong [ref=e782]: Elimination Strategy
                    - paragraph [ref=e784]: "When stuck: (1) Cross out options that don't match word type. (2) Eliminate reversed relationships. (3) Remove overly specific or general answers. Usually 2-3 options get eliminated quickly."
                  - listitem [ref=e785]:
                    - strong [ref=e786]: Common Traps
                    - paragraph [ref=e788]: "Trap 1: Reversed relationship. Trap 2: Partial match. Trap 3: Association without true relationship. Trap 4: Too specific. Always verify: Does C relate to my answer exactly like A relates to B?"
                - button "Mark as Read" [ref=e789] [cursor=pointer]
            - generic [ref=e790]:
              - generic [ref=e791] [cursor=pointer]:
                - heading "Company-Specific Patterns" [level=3] [ref=e792]
                - generic [ref=e793]: ▼
              - generic:
                - paragraph [ref=e795]: Different companies favor different analogy types. Knowing their patterns gives you an edge.
                - list [ref=e796]:
                  - listitem [ref=e797]:
                    - strong [ref=e798]: TCS Patterns
                    - paragraph [ref=e800]: "TCS heavily tests: Profession-Tool, Animal-Young, Country-Capital, Synonym-Antonym mix. Difficulty: Medium. Time: 45 seconds per question."
                  - listitem [ref=e801]:
                    - strong [ref=e802]: Infosys Patterns
                    - paragraph [ref=e804]: "Infosys prefers: Cause-Effect, Part-Whole, Letter analogies with complex skips, Function-based. Difficulty: Medium-Hard."
                  - listitem [ref=e805]:
                    - strong [ref=e806]: Wipro Patterns
                    - paragraph [ref=e808]: "Wipro focuses on: Synonym-Antonym, Number analogies with squares/cubes, Simple function. Difficulty: Easy-Medium."
                  - listitem [ref=e809]:
                    - strong [ref=e810]: Accenture/Capgemini
                    - paragraph [ref=e812]: "Accenture: Mix of word and letter analogies, emphasis on speed. Capgemini: Loves classification analogies."
                  - listitem [ref=e813]:
                    - strong [ref=e814]: Cognizant/HCL
                    - paragraph [ref=e816]: "Cognizant: Straightforward word analogies, synonyms/antonyms. HCL: More abstract relationships and GK-based analogies."
                - button "Mark as Read" [ref=e817] [cursor=pointer]
            - generic [ref=e818]:
              - generic [ref=e819] [cursor=pointer]:
                - heading "Speed Shortcuts and Memory Tricks" [level=3] [ref=e820]
                - generic [ref=e821]: ▼
              - generic:
                - paragraph [ref=e823]: Master these to solve analogies in 20-30 seconds.
                - list [ref=e824]:
                  - listitem [ref=e825]:
                    - strong [ref=e826]: The 3-Second Relationship Label
                    - paragraph [ref=e828]: "The moment you read A:B, mentally say: Opposites!, Same!, Tool!, Home!, Baby!, Capital!. This labels the relationship instantly and prevents overthinking."
                  - listitem [ref=e829]:
                    - strong [ref=e830]: EJOTY Trick for Letter Positions
                    - paragraph [ref=e832]: Remember E=5, J=10, O=15, T=20, Y=25. Use these anchors to find positions quickly. M is 2 before O(15) so M=13.
                  - listitem [ref=e833]:
                    - strong [ref=e834]: Memory Tricks for Capitals
                    - paragraph [ref=e836]: "Create silly sentences: Delhi is India capital, DC is USA capital, London has Queen, Paris has Eiffel Tower. Weird associations are memorable."
                  - listitem [ref=e837]:
                    - strong [ref=e838]: Reverse Check Shortcut
                    - paragraph [ref=e840]: "After picking your answer, quickly verify by reversing: If A:B::C:D works, then B:A::D:C should also make sense. If not, reconsider!"
                  - listitem [ref=e841]:
                    - strong [ref=e842]: Animal Young Grouping
                    - paragraph [ref=e844]: "Group by pattern: Cub endings for big cats/bears, Calf for large animals (cow, elephant, whale), Lamb for sheep, Foal for horses, Chick for birds."
                - button "Mark as Read" [ref=e845] [cursor=pointer]
