<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aptitude Mastery - Number System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]});"></script>
</head>
<body>
  <div id="app">
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <span class="brand-icon">
            <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false" width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 18v28l16 8 16-8V18" fill="currentColor" fill-opacity="0.08"/>
              <path d="M16 18l16-8 16 8v28l-16 8-16-8V18z"/>
              <path d="M32 14v36"/>
              <path d="M22 28h20"/>
              <path d="M22 38h20"/>
            </svg>
          </span>
          <span class="brand-text">ApArena</span>
          <button class="sidebar-close" id="sidebar-close" aria-label="Close sidebar">&#10005;</button>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
        <div class="sidebar-footer">
          <div id="sidebar-progress">
            <div class="sidebar-progress-label">Progress</div>
            <div class="progress-bar"><div id="sidebar-progress-fill" style="width:0%"></div></div>
            <span id="sidebar-progress-text">0%</span>
          </div>
        </div>
      </aside>

      <div class="main-area">
        <header class="topbar">
          <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">&#9776;</button>
          <h1 class="topbar-title" id="header-title">Dashboard</h1>
          <div class="topbar-actions">
            <button class="menu-toggle" id="menu-toggle" aria-label="Toggle sidebar">Menu</button>
            <div id="toast-container" class="toast-container"></div>
            <button class="theme-btn" id="theme-toggle" aria-label="Toggle theme">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            </button>
          </div>
        </header>

        <main class="content" id="app-content"></main>
        <footer class="app-footer">Made for Siri with &hearts; by Nitin.</footer>
      </div>
    </div>

    <nav class="bottom-nav" id="bottom-nav">
      <button class="bottom-nav-item active" data-view="dashboard"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Home</span></button>
      <button class="bottom-nav-item" data-view="roadmap"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>Roadmap</span></button>
      <button class="bottom-nav-item" data-view="learn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span>Learn</span></button>
      <button class="bottom-nav-item" data-view="verbal"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg><span>Verbal</span></button>
      <button class="bottom-nav-item" data-view="mcq"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>MCQ</span></button>
    </nav>
  </div>
  <script>
    (async function() {
      try {
        const res = await fetch('data.json');
        window.APP_DATA = await res.json();
      } catch(e) {
        console.error('Failed to load data.json', e);
      }
      const s = document.createElement('script');
      s.src = 'js/app.js';
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
